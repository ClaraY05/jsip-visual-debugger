name: Claude Code

# Runs Claude Code in response to "@claude" mentions in issues, issue comments,
# PR review comments, and PR reviews. Requires an ANTHROPIC_API_KEY secret (or a
# CLAUDE_CODE_OAUTH_TOKEN) configured in the repository or organization:
#   Settings -> Secrets and variables -> Actions -> New repository secret.
# The secret is NOT copied when a repo is created from a template -- add it in
# each new repo, or set an org-level secret so all repos inherit it.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
